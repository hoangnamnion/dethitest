<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Làm Bài Thi</title>
    <!-- Preconnect cho Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body.low-graphics .mesh-bg { display: none !important; }
        body.low-graphics .falling-icon { display: none !important; }
        body.low-graphics canvas { display: none !important; }
        body.low-graphics * { animation: none !important; transition: none !important; }
        body.low-graphics { background: #f0f4f8 !important; }
    </style>
</head>

<body>
    <div class="mesh-bg">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
        <div class="mesh-blob blob-3"></div>
    </div>
    <div class="app-full">
        <div class="header">
            <button class="home-btn" onclick="goBack()" title="Quay lại">
                <img src="img/muiten.jpg" alt="Logo" class="logo-img">
            </button>

            <div style="flex:1; text-align:center; padding:0 10px">
                <div style="font-weight:700; font-size:0.9em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis"
                    id="sectionTitle">Loading...</div>
                <div id="timer" style="font-size: 0.8em; color: var(--primary); font-weight: 800; margin-top: 2px;">Thời
                    gian: 00:00</div>
            </div>

            <div style="display:flex; align-items:center; gap: 8px;">
                <button class="reset-btn" onclick="resetExam()" title="Làm lại từ đầu"
                    style="background:none; border:none; cursor:pointer; font-size:1.2em">🔄</button>
                <button class="submit-btn" onclick="finishExam()">✨ Nộp bài</button>
            </div>
        </div>

        <div class="content">
            <div style="text-align: right; margin-bottom: 5px;">
                <button class="low-graphics-btn" id="btnLowGraphics" onclick="toggleLowGraphics()" title="Tắt bớt hiệu ứng để đỡ giật lag cho máy yếu"
                    style="background:var(--white); border:1px solid #cbd5e1; padding:4px 10px; border-radius:8px; cursor:pointer; font-size:0.8em; font-weight:700; color:#e74c3c; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s;">⚡ Tắt Hiệu Ứng</button>
            </div>
            <div id="loading" style="text-align:center; margin-top:30px">Đang tải câu hỏi...</div>
            <div id="quizArea" style="display:none">
                <div style="color:var(--primary); font-weight:bold; margin-bottom:5px" id="qNumber"></div>
                <div class="question-text" id="qText"></div>
                <div class="options-grid" id="optionsArea"></div>
            </div>
        </div>

        <div class="footer">
            <button class="btn" onclick="toggleModal()" style="background:#dfe6e9">☰</button>
            <button class="btn btn-nav" id="btnPrev" onclick="changeQuestion(-1)">❮ Trước</button>
            <button class="btn btn-nav" id="btnNext" onclick="changeQuestion(1)">Tiếp ❯</button>
        </div>

        <div class="modal" id="modalList">
            <div class="header">
                <h3>Danh sách câu hỏi</h3>
                <button class="btn" onclick="toggleModal()"
                    style="color:red; background:none; font-size:1.5em">✕</button>
            </div>
            <div class="grid-map" id="gridMap"></div>
        </div>

        <div class="modal" id="modalResult"
            style="display:none; align-items:center; justify-content:center; background: rgba(0,0,0,0.5);">
            <div class="result-box">
                <div style="font-size:1.2em; font-weight:bold; color:#2d3436">KẾT QUẢ BÀI THI</div>
                <div class="res-score" id="resScore">0</div>
                <div class="res-detail">
                    <div class="res-item" style="color:#00b894"><b id="resRight">0</b>Đúng</div>
                    <div class="res-item" style="color:#d63031"><b id="resWrong">0</b>Sai</div>
                    <div class="res-item" style="color:#636e72"><b id="resSkip">0</b>Bỏ qua</div>
                </div>
                <div id="resTime" style="margin-bottom: 20px; font-weight: 600; color: var(--text-gray);">Tổng thời
                    gian: 00:00</div>

                <div style="display:flex; gap:10px; justify-content:center; flex-wrap: wrap;">
                    <button class="btn-close-res" onclick="closeResult()" style="background:var(--primary)">Xem
                        lại</button>
                    <button class="btn-close-res" onclick="resetExam()" style="background:#e17055">🔄 Thi lại</button>
                    <button class="btn-close-res" onclick="goBack()" style="background:#636e72">Thoát</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script src="js/hihihaaaa.js"></script>
    <script src="js/tkhethan.js"></script>
    <script src="js/new2.js"></script>
    <script src="js/certificate.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="js/script.js"></script>
    <script>
        // KIỂM TRA ĐĂNG NHẬP
        const userData = sessionStorage.getItem('current_user');
        if (!userData) {
            alert("Bạn cần phải đăng nhập để làm bài!");
            window.location.href = "login.html";
        }

        const p = new URLSearchParams(window.location.search);
        const fid = p.get('id');

        // Đã gỡ logic lowGraphics nội bộ, chuyển qua cho new2.js xử lý toàn cục

        if (fid) {
            window.onload = () => loadExam(fid);
        } else {
            alert("Lỗi mã đề!"); window.location.href = "index.html";
        }
        function goBack() { window.location.href = `product.html?id=${fid}`; }

        // --- SMART REVIEW FILTER ---
        function closeResult() { 
            document.getElementById('modalResult').style.display = 'none'; 
            
            if (typeof isSubmitted !== 'undefined' && isSubmitted) {
                showReviewFilterBar();
            }
        }

        function showReviewFilterBar() {
            let filterBar = document.getElementById('reviewFilterBar');
            if (!filterBar) {
                filterBar = document.createElement('div');
                filterBar.id = 'reviewFilterBar';
                filterBar.style.cssText = `
                    display: flex; gap: 8px; margin-bottom: 15px; padding: 10px;
                    background: rgba(255, 255, 255, 0.9);
                    backdrop-filter: blur(10px);
                    border-radius: 12px;
                    justify-content: center; flex-wrap: wrap;
                    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
                    border: 1px solid rgba(255,255,255,0.5);
                    animation: fadeIn 0.5s;
                `;
                
                const quizArea = document.getElementById('quizArea');
                quizArea.insertBefore(filterBar, quizArea.firstChild);
            }
            
            filterBar.style.display = 'flex';
            filterBar.innerHTML = `
                <button onclick="applyReviewFilter('all')" class="filter-btn" id="filter-all" style="background:#0984e3; color:white; border:none; padding:6px 15px; border-radius:20px; cursor:pointer; font-weight:bold; transition:0.3s; box-shadow:0 4px 6px rgba(9,132,227,0.3);">Tất cả</button>
                <button onclick="applyReviewFilter('wrong')" class="filter-btn" id="filter-wrong" style="background:#e17055; color:white; border:none; padding:6px 15px; border-radius:20px; cursor:pointer; font-weight:bold; transition:0.3s; opacity:0.6;">❌ Câu sai</button>
                <button onclick="applyReviewFilter('skipped')" class="filter-btn" id="filter-skipped" style="background:#636e72; color:white; border:none; padding:6px 15px; border-radius:20px; cursor:pointer; font-weight:bold; transition:0.3s; opacity:0.6;">⚠️ Chưa làm</button>
                <button onclick="applyReviewFilter('bookmarked')" class="filter-btn" id="filter-bookmarked" style="background:#f1c40f; color:#2c3e50; border:none; padding:6px 15px; border-radius:20px; cursor:pointer; font-weight:bold; transition:0.3s; opacity:0.6;">🚩 Đã ghim</button>
            `;

            setupReviewObserver();
        }

        function applyReviewFilter(type) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.style.opacity = '0.6'; btn.style.boxShadow = 'none';
            });
            
            const activeBtn = document.getElementById('filter-' + type);
            if (activeBtn) {
                activeBtn.style.opacity = '1';
                let color = 'rgba(99,110,114,0.3)';
                if (type === 'all') color = 'rgba(9,132,227,0.3)';
                if (type === 'wrong') color = 'rgba(225,112,85,0.3)';
                if (type === 'bookmarked') color = 'rgba(241,196,15,0.5)';
                activeBtn.style.boxShadow = '0 4px 6px ' + color;
            }
            
            if (type === 'all') {
                isRetryMode = false;
            } else if (type === 'wrong') {
                isRetryMode = true;
                filteredQuestions = allQuestions.filter(q => q.firstAttemptSelected !== null && !q.isCorrectFirstTime);
                filteredQuestions.forEach((q, idx) => q.filteredIndex = idx);
            } else if (type === 'skipped') {
                isRetryMode = true;
                filteredQuestions = allQuestions.filter(q => q.firstAttemptSelected === null);
                filteredQuestions.forEach((q, idx) => q.filteredIndex = idx);
            } else if (type === 'bookmarked') {
                isRetryMode = true;
                let bms = [];
                try {
                    bms = JSON.parse(localStorage.getItem('bookmarks_' + currentFileName)) || [];
                } catch(e) {}
                filteredQuestions = allQuestions.filter(q => bms.includes(q.originalIndex));
                filteredQuestions.forEach((q, idx) => q.filteredIndex = idx);
            }
            
            currentIndex = 0;
            if (typeof renderQuestion === 'function') {
                if(isRetryMode && filteredQuestions.length === 0) {
                    document.getElementById('qText').innerHTML = '<div style="text-align:center; padding: 20px; font-weight:bold; color:#636e72">Không có câu hỏi nào trong mục này!</div>';
                    document.getElementById('optionsArea').innerHTML = '';
                    document.getElementById('qNumber').innerHTML = 'Lọc: 0 câu';
                    document.getElementById('btnPrev').disabled = true;
                    document.getElementById('btnNext').disabled = true;
                } else {
                    renderQuestion(0);
                }
            }
        }

        let obs = null;
        function setupReviewObserver() {
            if (obs) return;
            const target = document.getElementById('qNumber');
            obs = new MutationObserver(() => {
                // Sửa chữ "Làm lại lần" thành "Chế độ xem lại"
                if (typeof isSubmitted !== 'undefined' && isSubmitted && typeof isRetryMode !== 'undefined' && isRetryMode) {
                    const el = document.getElementById('qNumber');
                    if (el && el.innerHTML.includes('Làm lại lần')) {
                        el.innerHTML = el.innerHTML.replace(/Làm lại lần \d+/, 'Lọc câu hỏi');
                    }
                }
            });
            if(target) obs.observe(target, { childList: true, subtree: true });
            
            // Auto hide filter bar if exam is restarted
            setInterval(() => {
                const fb = document.getElementById('reviewFilterBar');
                if (fb && typeof isSubmitted !== 'undefined' && !isSubmitted) {
                    fb.style.display = 'none';
                }
            }, 500);
        }

    </script>
    <script src="js/tet.js"></script>
    <script src="js/music.js"></script>
    <script src="js/no-refresh.js"></script>
</body>

</html>
