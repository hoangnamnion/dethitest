<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover, minimal-ui">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tài liệu bảo mật</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Reset và cơ bản */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: #0f172a;
            font-family: 'Montserrat', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Chặn bôi đen văn bản trên PC */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Mesh background */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .mesh-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            animation: blob 15s infinite alternate;
        }

        .blob-1 {
            top: -20%;
            left: -10%;
            width: 60vw;
            height: 60vw;
            background: #3b82f6;
        }

        .blob-2 {
            bottom: -20%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: #8b5cf6;
            animation-delay: 2s;
        }

        .blob-3 {
            top: 40%;
            left: 40%;
            width: 50vw;
            height: 50vw;
            background: #06b6d4;
            animation-delay: 4s;
        }

        @keyframes blob {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        /* Giao diện đăng nhập */
        #login-form {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 45px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 420px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            animation: fadeInUp 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .doc-title {
            color: #e2e8f0;
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 8px 0;
        }

        .doc-subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .lock-icon {
            font-size: 52px;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 8px rgba(59, 130, 246, 0.3));
        }

        h2 {
            margin-top: 0;
            color: #e2e8f0;
            font-size: 26px;
            font-weight: 800;
        }

        p {
            color: #94a3b8;
            font-size: 14px;
        }

        input {
            padding: 14px 18px;
            width: 100%;
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            margin-bottom: 18px;
            outline: none;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .btn-unlock {
            padding: 14px 30px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            font-family: inherit;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 5px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .btn-unlock:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }

        .btn-unlock:active {
            transform: translateY(0);
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
        }

        /* Container cho PDF.js */
        #pdf-container {
            display: none;
            width: 100%;
            min-height: 100vh;
            position: relative;
            background: #1e293b;
        }

        /* Canvas hiển thị PDF */
        #pdf-canvas {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        /* Thanh điều khiển PDF */
        #pdf-controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.9);
            padding: 12px 24px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .control-btn {
            background: transparent;
            color: #e2e8f0;
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 18px;
            font-family: inherit;
        }

        .control-btn:hover {
            background: rgba(59, 130, 246, 0.3);
            transform: scale(1.1);
        }

        .control-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .control-btn:disabled:hover {
            background: transparent;
            transform: none;
        }

        #page-info {
            color: #94a3b8;
            font-size: 14px;
            min-width: 80px;
            text-align: center;
            font-weight: 600;
        }

        /* Container tải DOCX */
        #docx-container {
            display: none;
            width: 100%;
            min-height: 100vh;
            background: #e2e8f0;
            padding-bottom: 20px;
        }

        #docx-container .docx-wrapper {
            background: transparent !important;
            padding: 10px !important;
        }

        #docx-container .docx-wrapper>section.docx {
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15) !important;
            margin-bottom: 15px !important;
            width: 100% !important;
            box-sizing: border-box !important;
            padding: 15px !important;
            min-height: auto !important;
        }

        #docx-container .docx-wrapper>section.docx img {
            max-width: 100% !important;
            height: auto !important;
        }

        /* Ép toàn bộ chữ trong Word thành màu đen */
        #docx-container .docx-wrapper>section.docx,
        #docx-container .docx-wrapper>section.docx p,
        #docx-container .docx-wrapper>section.docx span,
        #docx-container .docx-wrapper>section.docx h1,
        #docx-container .docx-wrapper>section.docx h2,
        #docx-container .docx-wrapper>section.docx h3,
        #docx-container .docx-wrapper>section.docx h4,
        #docx-container .docx-wrapper>section.docx li,
        #docx-container .docx-wrapper>section.docx a,
        #docx-container .docx-wrapper>section.docx td,
        #docx-container .docx-wrapper>section.docx th {
            color: #000000 !important;
        }

        /* Thanh tiến trình */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            flex-direction: column;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 4px solid #3b82f6;
            width: 50px;
            height: 50px;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Thông báo lỗi */
        #error-msg {
            color: #f87171;
            margin-top: 12px;
            font-size: 13px;
            min-height: 20px;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-box {
                padding: 30px 25px;
                width: 92%;
            }

            #pdf-controls {
                bottom: 10px;
                padding: 10px 16px;
                gap: 8px;
            }

            .control-btn {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }

            #page-info {
                font-size: 13px;
                min-width: 70px;
            }
        }

        @media (max-width: 480px) {
            h2 {
                font-size: 22px;
            }

            .lock-icon {
                font-size: 42px;
            }

            #pdf-controls {
                width: 92%;
                justify-content: space-between;
            }
        }

        /* Thanh cuộn tùy chỉnh */
        #pdf-scroll-container {
            width: 100%;
            min-height: 100vh;
            padding: 20px 0 100px 0;
            box-sizing: border-box;
        }

        /* Màn hình cảnh báo chụp màn hình */
        #screenshot-warning {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 9999999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ff3b30;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #screenshot-warning h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 15px;
            text-transform: uppercase;
            color: #ff3b30;
            margin-top: 0;
        }

        #screenshot-warning p {
            font-size: 16px;
            color: #fff;
            line-height: 1.6;
        }

        @media print {
            body * {
                visibility: hidden;
            }
            #screenshot-warning {
                display: flex !important;
                visibility: visible !important;
            }
            #screenshot-warning * {
                visibility: visible !important;
            }
        }
    </style>
    <!-- PDF.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- DOCX Library (hỗ trợ đọc file Word) -->
    <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <script src="https://unpkg.com/docx-preview/dist/docx-preview.min.js"></script>
</head>

<body>

    <!-- Màn hình đen cảnh báo -->
    <div id="screenshot-warning">
        <h1>Cảnh báo bảo mật!</h1>
        <p>Phát hiện hành động chụp ảnh/in tài liệu.<br>Tài khoản của bạn sẽ bị <b>KHÓA VĨNH VIỄN</b> nếu tiếp tục vi phạm.</p>
    </div>

    <!-- Mesh Background -->
    <div class="mesh-bg">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
        <div class="mesh-blob blob-3"></div>
    </div>

    <div id="login-form">
        <div class="login-box">
            <div class="lock-icon">🔒</div>
            <h2>Tài liệu bảo mật</h2>
            <div class="doc-title" id="docTitle">Đang tải...</div>
            <div class="doc-subtitle">Vui lòng nhập mật khẩu để truy cập</div>
            <input type="password" id="password" placeholder="Nhập mật khẩu..." autocomplete="off">
            <button class="btn-unlock" onclick="checkPassword()">🔓 Mở tài liệu</button>
            <div id="error-msg"></div>
            <a href="sbvl.html" class="btn-back">← Quay lại</a>
        </div>
    </div>

    <!-- Overlay tải PDF -->
    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Đang tải tài liệu...</div>
        <div id="progress-text" style="margin-top: 10px; font-size: 14px; color: #94a3b8;"></div>
    </div>

    <!-- Container hiển thị PDF -->
    <div id="pdf-container">
        <div id="docx-container"></div>
        <div id="pdf-scroll-container">
            <canvas id="pdf-canvas"></canvas>
        </div>
        <div id="pdf-controls">
            <button class="control-btn" id="prev-page" disabled>‹</button>
            <span id="page-info">Trang: <span id="current-page">1</span>/<span id="total-pages">1</span></span>
            <button class="control-btn" id="next-page" disabled>›</button>
            <button class="control-btn" id="zoom-out" title="Thu nhỏ">−</button>
            <button class="control-btn" id="zoom-in" title="Phóng to">+</button>
            <button class="control-btn" id="close-pdf" title="Đóng">✕</button>
        </div>
    </div>

    <script>
        // Cấu hình PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Biến toàn cục
        let pdfDoc = null;
        let currentPage = 1;
        let scale = 1.5;
        let canvas = document.getElementById('pdf-canvas');
        let ctx = canvas.getContext('2d');

        // Lấy thông tin từ URL params
        const params = new URLSearchParams(window.location.search);
        const pdfFile = params.get('file') || 'sbvl.pdf';
        const docName = params.get('name') || 'Tài liệu';
        const docPass = params.get('pass') || '5432';

        // Hiển thị tên tài liệu
        document.getElementById('docTitle').textContent = docName;
        document.title = docName + ' - Tài liệu bảo mật';

        // Mật khẩu
        const correctPassword = docPass;

        // Biến đếm số lần thử
        let failedAttempts = 0;
        const maxAttempts = 5;

        // URL của file PDF
        const pdfFileUrl = "filethi/" + pdfFile;

        // Kiểm tra mật khẩu
        function checkPassword() {
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            if (password === correctPassword) {
                failedAttempts = 0;
                errorMsg.textContent = "";

                document.getElementById('login-form').style.display = 'none';

                const loadingOverlay = document.getElementById('loading-overlay');
                loadingOverlay.style.display = 'flex';

                loadAndDisplayPDF(pdfFileUrl);

            } else {
                failedAttempts++;

                if (failedAttempts >= maxAttempts) {
                    errorMsg.textContent = "Đã vượt quá số lần thử. Vui lòng thử lại sau 5 phút.";
                    document.getElementById('password').disabled = true;
                    document.querySelector('.btn-unlock').disabled = true;

                    setTimeout(() => {
                        document.getElementById('password').disabled = false;
                        document.querySelector('.btn-unlock').disabled = false;
                        errorMsg.textContent = "";
                        failedAttempts = 0;
                    }, 300000);
                } else {
                    errorMsg.textContent = `Sai mật khẩu! Còn ${maxAttempts - failedAttempts} lần thử.`;
                }

                document.getElementById('password').value = "";
                document.getElementById('password').focus();
            }
        }

        // Tải và hiển thị dữ liệu (cả PDF và Word)
        async function loadAndDisplayPDF(url) {
            try {
                document.getElementById('loading-text').textContent = "Đang tải tài liệu...";
                document.getElementById('loading-overlay').style.display = 'flex';

                const ext = url.split('.').pop().toLowerCase();

                if (ext === 'docx') {
                    // Logic xử lý file Word DOCX
                    document.getElementById('pdf-scroll-container').style.display = 'none';
                    document.getElementById('pdf-controls').style.display = 'none';
                    document.getElementById('docx-container').style.display = 'block';

                    const response = await fetch(url);
                    if (!response.ok) throw new Error("Không tìm thấy file");
                    const blob = await response.blob();

                    const container = document.getElementById("docx-container");
                    await docx.renderAsync(blob, container, null, {
                        className: "docx",
                        inWrapper: true,
                        ignoreWidth: true,   // Cực kỳ quan trọng để Word ko bị tràn sang 2 bên
                        ignoreHeight: true,
                        breakPages: false    // Bỏ phân trang để lướt liên tục như xem bài đọc web
                    });

                    document.getElementById('loading-overlay').style.display = 'none';
                    document.getElementById('pdf-container').style.display = 'block';

                    // Thêm nút Quay lại cho chế độ xem Word
                    const btnBox = document.createElement('div');
                    btnBox.innerHTML = '<button onclick="window.location.href=\'sbvl.html\'" style="position:fixed; bottom:20px; right:20px; background:#1e293b; color:#e2e8f0; border:1px solid #3b82f6; padding:12px 25px; border-radius:30px; font-weight:bold; box-shadow:0 5px 15px rgba(0,0,0,0.4); z-index:9999;">← Quay lại</button>';
                    document.getElementById('pdf-container').appendChild(btnBox);

                    return; // Thoát hàm để tải xong file word
                } else if (ext === 'doc') {
                    alert("⚠️ Hệ thống chỉ hỗ trợ định dạng Word (.DOCX). Bạn vui lòng lưu lại file (Save As) dạng .DOCX hoặc .PDF rồi dùng nhé!");
                    window.location.href = 'sbvl.html';
                    return;
                }

                // Xử lý mặc định cho file PDF
                const loadingTask = pdfjsLib.getDocument(url);

                loadingTask.onProgress = function (progressData) {
                    if (progressData.total) {
                        const progress = Math.round((progressData.loaded / progressData.total) * 100);
                        document.getElementById('progress-text').textContent = `Đang tải: ${progress}%`;
                    }
                };

                pdfDoc = await loadingTask.promise;

                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('pdf-container').style.display = 'block';

                renderPage(currentPage);

                document.getElementById('total-pages').textContent = pdfDoc.numPages;
                updatePageControls();

            } catch (error) {
                console.error("Lỗi tải tệp:", error);
                document.getElementById('loading-text').textContent = "Lỗi tải tài liệu!";
                document.getElementById('progress-text').textContent = "Vui lòng xem lại định dạng hoặc đảm bảo tệp tồn tại.";

                setTimeout(() => {
                    document.getElementById('loading-overlay').style.display = 'none';
                    window.location.href = 'sbvl.html';
                }, 3000);
            }
        }

        // Hiển thị trang PDF
        async function renderPage(pageNum) {
            try {
                document.getElementById('loading-overlay').style.display = 'flex';
                document.getElementById('loading-text').textContent = `Đang tải trang ${pageNum}...`;
                document.getElementById('progress-text').textContent = "";

                const page = await pdfDoc.getPage(pageNum);

                // Tự động scale cho vừa màn hình mobile ở lần đầu tiên
                if (window.innerWidth < 768 && !window.initialScaleSet) {
                    const unscaledViewport = page.getViewport({ scale: 1.0 });
                    scale = (window.innerWidth - 20) / unscaledViewport.width;
                    if (scale < 0.3) scale = 0.3; // chống quá nhỏ
                    window.initialScaleSet = true;
                }

                const viewport = page.getViewport({ scale: scale });

                // Tăng độ sắc nét cực đại cho màn hình điện thoại (Retina/High DPI)
                const outputScale = window.devicePixelRatio || 1;

                canvas.width = Math.floor(viewport.width * outputScale);
                canvas.height = Math.floor(viewport.height * outputScale);
                canvas.style.width = Math.floor(viewport.width) + "px";
                canvas.style.height = Math.floor(viewport.height) + "px";

                const transform = outputScale !== 1
                    ? [outputScale, 0, 0, outputScale, 0, 0]
                    : null;

                const renderContext = {
                    canvasContext: ctx,
                    transform: transform,
                    viewport: viewport
                };

                await page.render(renderContext).promise;

                document.getElementById('loading-overlay').style.display = 'none';
                document.getElementById('current-page').textContent = pageNum;

                window.scrollTo({ top: 0, behavior: 'smooth' });

            } catch (error) {
                console.error("Lỗi render trang:", error);
                document.getElementById('loading-overlay').style.display = 'none';
                alert("Lỗi hiển thị trang. Vui lòng thử lại.");
            }
        }

        // Cập nhật trạng thái nút điều khiển trang
        function updatePageControls() {
            const prevBtn = document.getElementById('prev-page');
            const nextBtn = document.getElementById('next-page');

            prevBtn.disabled = currentPage <= 1;
            nextBtn.disabled = currentPage >= pdfDoc.numPages;
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderPage(currentPage);
                updatePageControls();
            }
        }

        function nextPage() {
            if (currentPage < pdfDoc.numPages) {
                currentPage++;
                renderPage(currentPage);
                updatePageControls();
            }
        }

        function zoomIn() {
            if (scale < 3) {
                scale += 0.25;
                renderPage(currentPage);
            }
        }

        function zoomOut() {
            if (scale > 0.5) {
                scale -= 0.25;
                renderPage(currentPage);
            }
        }

        function closePDF() {
            window.location.href = 'sbvl.html';
        }

        // Chức năng hiển thị cảnh báo chụp màn hình
        function showScreenshotWarning() {
            const warningEl = document.getElementById('screenshot-warning');
            warningEl.style.display = 'flex';
            
            try {
                navigator.clipboard.writeText('Tài liệu có bản quyền. Hành vi sao chép bị nghiêm cấm.');
            } catch (e) {}
            
            setTimeout(() => {
                warningEl.style.display = 'none';
            }, 5000);
        }

        // Bắt sự kiện phím PrintScreen
        document.addEventListener('keyup', function (e) {
            if (e.key === 'PrintScreen' || e.keyCode === 44) {
                showScreenshotWarning();
            }
        });

        // Bắt sự kiện khi cố in tài liệu (Ctrl+P hoặc từ menu)
        window.addEventListener('beforeprint', function () {
            showScreenshotWarning();
        });

        // Chặn chuột phải (Context menu)
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // Chặn copy, cut, paste
        document.addEventListener('copy', function(e) { e.preventDefault(); });
        document.addEventListener('cut', function(e) { e.preventDefault(); });
        document.addEventListener('paste', function(e) { e.preventDefault(); });

        // Chặn bôi đen và kéo thả
        document.addEventListener('selectstart', function(e) { e.preventDefault(); });
        document.addEventListener('dragstart', function(e) { e.preventDefault(); });

        // Bảo mật Mobile: Ẩn nội dung khi chuyển tab, mở đa nhiệm (chống chụp lén qua App Switcher)
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                document.body.style.opacity = '0';
            } else {
                document.body.style.opacity = '1';
            }
        });

        window.addEventListener('blur', function() {
            document.body.style.opacity = '0';
        });

        window.addEventListener('focus', function() {
            document.body.style.opacity = '1';
        });

        // Event listeners
        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        document.getElementById('prev-page').addEventListener('click', prevPage);
        document.getElementById('next-page').addEventListener('click', nextPage);
        document.getElementById('zoom-in').addEventListener('click', zoomIn);
        document.getElementById('zoom-out').addEventListener('click', zoomOut);
        document.getElementById('close-pdf').addEventListener('click', closePDF);

        // Đã gỡ bỏ tính năng vuốt trái/phải để chuyển trang trên điện thoại theo yêu cầu

        window.addEventListener('load', function () {
            const loadingOverlay = document.getElementById('loading-overlay');
            loadingOverlay.style.display = 'flex';
            loadAndDisplayPDF(pdfFileUrl);
        });

        // Ngăn chặn phím tắt khi xem PDF
        document.addEventListener('keydown', function (e) {
            // Chặn F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U (Mở DevTools và View Source)
            if (e.key === 'F12' || 
               ((e.ctrlKey || e.metaKey) && e.shiftKey && ['i', 'I', 'j', 'J', 'c', 'C'].includes(e.key)) ||
               ((e.ctrlKey || e.metaKey) && ['u', 'U'].includes(e.key))) {
                e.preventDefault();
                return false;
            }

            // Chặn Ctrl+C, Ctrl+X, Ctrl+V, Ctrl+A (Sao chép, dán, chọn tất cả)
            if ((e.ctrlKey || e.metaKey) && ['c', 'C', 'x', 'X', 'v', 'V', 'a', 'A'].includes(e.key)) {
                e.preventDefault();
                return false;
            }

            // Tổ hợp phím chụp màn hình trên Windows/Mac (Ctrl/Cmd + Shift + S/3/4/5)
            if ((e.metaKey || e.ctrlKey) && e.shiftKey && ['s', 'S', '3', '4', '5'].includes(e.key)) {
                e.preventDefault();
                showScreenshotWarning();
            }

            if (document.getElementById('pdf-container').style.display === 'block') {
                if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
                    e.preventDefault();
                    alert("Chức năng in đã bị vô hiệu hóa cho tài liệu này.");
                    return false;
                }

                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    return false;
                }

                if (e.key === 'ArrowLeft') {
                    prevPage();
                    e.preventDefault();
                } else if (e.key === 'ArrowRight') {
                    nextPage();
                    e.preventDefault();
                }
            }
        });
    </script>
</body>

</html>
