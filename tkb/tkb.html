<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#eef4fb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Thời Khóa Biểu</title>
    <meta name="description" content="Xem lịch học theo từng ngày trong tuần — giao diện đẹp, dùng được trên điện thoại.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/thoikhoabieu.css">
</head>
<body>

    <!-- ── HEADER ── -->
    <header class="app-header" id="app-header">
        <div class="header-inner">
            <div class="header-left">
                <h1><i class="fa-solid fa-calendar-days"></i> Thời Khóa Biểu</h1>
                <p id="header-date">Đang tải...</p>
            </div>
            <div class="header-right">
                <button class="week-view-btn" id="week-view-btn" aria-label="Xem cả tuần">
                    <i class="fa-solid fa-table-cells-large"></i>
                    <span>Cả tuần</span>
                </button>
                <div class="live-clock" id="live-clock">
                    <div class="live-dot"></div>
                    <span class="clock-time" id="clock-time">--:--</span>
                </div>
            </div>
        </div>
    </header>

    <!-- ── MAIN CONTENT ── -->
    <div class="main-scroll" id="main-scroll">

        <!-- Today hero banner -->
        <div class="today-hero" id="today-hero">
            <div class="today-hero-left">
                <div class="today-hero-icon">📅</div>
                <div class="today-hero-text">
                    <div class="label">Đang xem</div>
                    <div class="day-name" id="hero-day-name">--</div>
                    <div class="full-date" id="hero-full-date">--</div>
                </div>
            </div>
            <div class="class-count-badge" id="class-count-badge">
                <div class="count" id="hero-count">0</div>
                <span class="count-label">tiết học</span>
            </div>
        </div>

        <!-- Section title -->
        <div class="section-title">
            <i class="fa-solid fa-list-ul"></i> Lịch học
        </div>

        <!-- Timeline / cards -->
        <div class="timeline" id="timeline-content">
            <!-- Rendered by JS -->
        </div>
    </div>

    <!-- ── BOTTOM NAV ── -->
    <nav class="bottom-nav" id="bottom-nav">
        <div class="nav-inner" id="nav-inner">
            <!-- Rendered by JS -->
        </div>
    </nav>

    <!-- ── WEEK VIEW OVERLAY ── -->
    <div class="week-overlay" id="week-overlay" aria-hidden="true">
        <div class="week-overlay-header">
            <h2><i class="fa-solid fa-calendar-week"></i> Lịch cả tuần</h2>
            <button class="week-close-btn" id="week-close-btn" aria-label="Đóng">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="week-overlay-body" id="week-overlay-body">
            <!-- Rendered by JS -->
        </div>
    </div>

    <!-- ── FOOTER CREDIT ── -->
    <footer class="author-footer">
        <span>Thiết kế bởi</span>
        <span class="author-name"><i class="fa-solid fa-pen-ruler"></i> Cao Văn Nam</span>
    </footer>

    <!-- Scripts -->
    <script src="js/datatkb.js"></script>
    <script src="js/thoikhoabieu.js"></script>
</body>
</html>
