<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Danh Sách Đề Thi</title>
    <!-- Preconnect cho Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .announcement-banner {
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 100%);
            color: #d63031;
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 0.9em;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            box-shadow: 0 4px 15px rgba(214, 48, 49, 0.15);
            display: flex;
            align-items: center;
        }

        .announcement-banner::before {
            content: '📌 Tin mới';
            margin-right: 10px;
            z-index: 2;
            background: #fff;
            color: #d63031;
            padding: 3px 10px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            position: relative;
            font-size: 0.85em;
        }

        .marquee-wrapper {
            flex: 1;
            overflow: hidden;
        }

        .marquee-text {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 35s linear infinite;
        }

        @keyframes marquee {
            0% {
                transform: translateX(100%);
            }

            100% {
                transform: translateX(-150%);
            }
        }

        /* Hamburger Menu */
        .dropdown-menu {
            position: relative;
            display: inline-block;
        }

        .hamburger-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #2d3436;
            font-size: 1.2em;
            padding: 6px 12px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            backdrop-filter: blur(5px);
            transition: 0.2s;
        }

        .hamburger-btn:hover {
            background: rgba(255, 255, 255, 1);
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            margin-top: 8px;
            background-color: white;
            min-width: 160px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            z-index: 1000;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.05);
            animation: dropFadeIn 0.2s;
        }

        .dropdown-content.show {
            display: block;
        }

        .dropdown-content button {
            color: #2d3436;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            width: 100%;
            text-align: left;
            border: none;
            background: none;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 1px solid #f1f2f6;
            font-size: 0.95em;
        }

        .dropdown-content button:last-child {
            border-bottom: none;
        }

        .dropdown-content button:hover {
            background-color: #f8f9fa;
        }

        @keyframes dropFadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="mesh-bg">
        <div class="mesh-blob blob-1"></div>
        <div class="mesh-blob blob-2"></div>
        <div class="mesh-blob blob-3"></div>
    </div>
    <div class="container-box">
        <!-- Thông tin người dùng nhanh -->
        <div class="user-info-bar">
            <div id="headerUserName"
                style="font-size: 0.85em; font-weight: 700; color: #007bff; background: rgba(255,255,255,0.7); padding: 5px 12px; border-radius: 12px; backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.03);">
                👨‍🎓 ...
            </div>
            <div class="dropdown-menu">
                <button class="hamburger-btn" onclick="toggleDropdown()">☰</button>
                <div class="dropdown-content" id="myDropdown">
                    <button onclick="showOnlineStatus()"><span style="display:inline-block; width:20px;">🟢</span>
                        Online</button>
                    <button onclick="showLeaderboard()"><span style="display:inline-block; width:20px;">🏆</span> Xếp
                        Hạng</button>
                    <button onclick="window.location.href='profile.html'"><span
                            style="display:inline-block; width:20px;">👤</span> Hồ sơ</button>
                    <button onclick="logout()" style="color: #e74c3c;"><span
                            style="display:inline-block; width:20px;">🚪</span> Thoát</button>
                </div>
            </div>
        </div>

        <!-- Thanh thông báo ngang đỉnh trang -->
        <div class="announcement-banner">
            <div class="marquee-wrapper">
                <span class="marquee-text"></span>
            </div>
        </div>

        <div class="school-logos">
            <img src="img/logo.jpg" alt="Logo" class="logo-school">
        </div>

        <div class="premium-title"><img src="anhnen/logochu.gif" alt="icon"
                style="height: 1.2em; vertical-align: bottom; margin-right: 8px;"> NGÂN HÀNG ĐỀ</div>
        <div class="premium-subtitle">HỆ THỐNG THI TRẮC NGHIỆM ĐIỆN TỬ 2026</div>
        <div class="grid-menu" id="menuGrid"></div>
    </div>

    <!-- Load script đồng bộ để tránh lỗi undefined -->
    <script src="js/api-config.js"></script>
    <script src="js/LXD.js"></script>
    <script src="js/tkhethan.js"></script>
    <script src="js/new2.js"></script>
    <script src="js/thongbao.js"></script>
    <script src="js/online.js"></script>
    <script src="js/leaderboard.js"></script>
    <script src="js/tet.js"></script>
    <script src="js/no-refresh.js"></script>
    <script>

        // ==========================================
        // DANH SÁCH ĐỀ SẼ NẠP TỰ ĐỘNG DỰA VÀO TÀI KHOẢN 
        // ==========================================
        let danhSachDeThi = [];

        // ==========================================
        // KIỂM TRA ĐĂNG NHẬP
        // ==========================================`
        (function checkLogin() {
            const userData = sessionStorage.getItem('current_user');

            if (!userData) {
                // Chưa đăng nhập, chuyển đến trang login
                window.location.href = "../login.html";
                return;
            }

            // Đã đăng nhập, cập nhật tên người dùng lên góc phải (đã tạo sẵn HTML ở trên)
            try {
                const user = JSON.parse(userData);
                const headerUserName = document.getElementById('headerUserName');
                if (headerUserName && user.username) {
                    headerUserName.innerHTML = `👨‍🎓 <b>${user.username}</b>`;
                }

                // 🌟 NẠP ĐỀ THI TƯƠNG ỨNG VỚI TÀI KHOẢN
                // Dữ liệu exams đã được lưu sẵn trong sessionStorage lúc đăng nhập thành công
                if (user && user.exams && user.exams.length > 0) {
                    danhSachDeThi = user.exams;
                } else {
                    danhSachDeThi = DEFAULT_EXAMS;
                }

            } catch (e) {
                console.error("Lỗi đọc thông tin người dùng:", e);
            }
        })();

        // HÀM ĐĂNG XUẤT RÕ RÀNG VÀ BÁO TELEGRAM
        async function logout() {
            if (confirm("Bạn có chắc chắn muốn thoát tài khoản khỏi hệ thống?")) {
                try {
                    const userData = JSON.parse(sessionStorage.getItem('current_user'));
                    if (userData && userData.accountId && typeof getTelegramBotToken !== 'undefined') {
                        const ipRes = await fetch('https://get.geojs.io/v1/ip/geo.json');
                        const ipData = await ipRes.json();
                        let exactLat = sessionStorage.getItem('exact_lat');
                        let exactLng = sessionStorage.getItem('exact_lng');
                        let lat = exactLat ? exactLat : ipData.latitude;
                        let lng = exactLng ? exactLng : ipData.longitude;
                        let locationType = exactLat ? "GPS Chính xác" : "Theo IP";

                        const mapLink = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
                        const device = navigator.userAgent;
                        const msg = `🚪 <b>ĐĂNG XUẤT</b>\n👤 Tài khoản: <code>${userData.accountId}</code>\n🌐 IP: ${ipData.ip}\n📍 Vị trí (${locationType}): <a href="${mapLink}">${ipData.city || 'N/A'}, ${ipData.region || 'N/A'}</a>\n📱 Thiết bị: <code>${device}</code>\n⏱ T.Gian: ${new Date().toLocaleString('vi-VN')}`;

                        // GHI LOG HOẠT ĐỘNG (gửi ngầm)
                        navigator.sendBeacon(API_BASE, JSON.stringify({
                            action: 'logActivity',
                            username: userData.username || userData.accountId,
                            text: 'Đăng xuất khỏi hệ thống',
                            device: navigator.userAgent
                        }));

                        // GỬI TELEGRAM
                        await fetch(`https://api.telegram.org/bot${getTelegramBotToken()}/sendMessage`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ chat_id: getTelegramChatId(), text: msg, parse_mode: 'HTML' })
                        });
                    }
                } catch (e) { console.error(e); }

                sessionStorage.removeItem('current_user');
                window.location.href = "login.html";
            }
        }
        // ==========================================
        // TRANG WWEB 
        // ==========================================\


        const menuGrid = document.getElementById('menuGrid');

        danhSachDeThi.forEach(item => {
            const btn = document.createElement('div');
            btn.className = 'menu-btn';

            let badge = '';

            // Chỉ hiển thị điểm đối với các bài thi (có thuộc tính 'file')
            if (item.file) {
                const savedData = localStorage.getItem('quiz_data_' + item.file);
                if (savedData) {
                    const parsed = JSON.parse(savedData);
                    if (parsed.isSubmitted && parsed.score !== undefined) {
                        badge = `<div class="badge-score">Điểm: ${parsed.score}</div>`;
                    } else if (parsed.history && parsed.history.some(h => h.userSelected !== null)) {
                        badge = `<div class="badge-score" style="background:#3498db">Đang làm</div>`;
                    }
                }
            }

            let iconOrImagePart = '';
            if (item.IMG || item.img) {
                const imgSrc = item.IMG || item.img;
                iconOrImagePart = `<img loading="lazy" src="${imgSrc}" style="width: 50px; height: 50px; object-fit: contain; margin-bottom: 5px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));">`;
            } else if (item.icon) {
                iconOrImagePart = `<div style="font-size:2em; margin-bottom:5px">${item.icon}</div>`;
            } else {
                iconOrImagePart = `<img loading="lazy" src="anhnen/Booke.gif" style="width: 50px; height: 50px; object-fit: contain; margin-bottom: 5px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));">`;
            }

            btn.innerHTML = `
        ${iconOrImagePart}
        <div style="font-weight:700; font-size:0.9em">${item.ten}</div> 
        ${badge}
    `;

            // Logic xử lý khi click
            btn.onclick = () => {
                if (item.url) {
                    // Nếu có URL thì chuyển hướng đến trang đó
                    window.location.href = item.url;
                } else {
                    // Nếu là đề thi thì chuyển đến trang làm bài
                    window.location.href = `product.html?id=${item.file}&name=${encodeURIComponent(item.ten)}`;
                }
            };
            menuGrid.appendChild(btn);
        });
    </script>
    <script>
        // JS để ẩn hiện dropdown
        function toggleDropdown() {
            document.getElementById("myDropdown").classList.toggle("show");
        }

        // Đóng dropdown nếu click ra ngoài
        window.onclick = function (event) {
            if (!event.target.matches('.hamburger-btn')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }
    </script>
</body>

</html>
